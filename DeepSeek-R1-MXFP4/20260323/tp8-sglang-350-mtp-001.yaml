---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tp8-sglang-mi350-mtp
  namespace: default
spec:

  replicas: 1
  selector:
    matchLabels:
      app: tp8-sglang-mi350
  template:
    metadata:
      labels:
        app: tp8-sglang-mi350
    spec:
      hostIPC: true

      nodeSelector:
        doks.digitalocean.com/gpu-model: mi350x

      tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
      
      containers:
      - name: vllm-inference-container 
        image: rocm/sgl-dev:v0.5.9-rocm720-mi35x-20260320
        #image: rocm/sgl-dev:v0.5.9-rocm700-mi35x-20260315
        #https://hub.docker.com/r/rocm/sgl-dev/tags

        imagePullPolicy: Always
        #command: ["sh", "-c", "sleep infinity"] # Test only
        command: 
        - bash
        - -c
        - |
          set -ex  

          # sleep infinity
 
          cd /sgl-workspace/sglang

          SGLANG_AITER_FP8_PREFILL_ATTN=1 \
          SGLANG_AITER_MLA_PERSIST=1 \
          AITER_MXFP4_MOE_SF=1 \
          SGLANG_USE_AITER=1 \
          SGLANG_INT4_WEIGHT=0 \
          SGLANG_MOE_PADDING=1 \
          SGLANG_SET_CPU_AFFINITY=1 \
          SGLANG_ROCM_FUSED_DECODE_MLA=1 \
          SGLANG_USE_ROCM700A=1 \
          python3 -m sglang.launch_server \
              --model-path amd/DeepSeek-R1-MXFP4 \
              --tensor-parallel-size 8 \
              --trust-remote-code \
              --host 0.0.0.0 \
              --port 8000 \
              --mem-fraction-static 0.95 \
              --chunked-prefill-size 131072 \
              --attention-backend aiter \
              --max-running-requests 64 \
              --kv-cache-dtype fp8_e4m3 \
              --speculative-algorithm EAGLE \
              --speculative-num-steps 3 \
              --speculative-eagle-topk 1 \
              --speculative-num-draft-tokens 4 \
              --speculative-draft-model-path lmsys/DeepSeek-R1-NextN 
              --max-queued-requests 128

          #   --log-requests 
          #   --max-queued-requests 64

        resources:
          limits:
            amd.com/gpu: 8
        volumeMounts:
        - name: temp-hf-cache
          mountPath: /root/.cache/huggingface
        - name: shm
          mountPath: /dev/shm
        - name: dev-kfd
          mountPath: /dev/kfd
        - name: dev-dri
          mountPath: /dev/dri
        securityContext:  # Container level
          capabilities:
            add:
            - SYS_PTRACE
          seccompProfile:
            type: Unconfined
      
      securityContext:
        supplementalGroups:  # Pod level
        - 44
      
      volumes:
      - name: temp-hf-cache
        hostPath:
          path: /root/.cache/huggingface
          type: DirectoryOrCreate
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 192Gi
      - name: dev-kfd
        hostPath:
          path: /dev/kfd
      - name: dev-dri
        hostPath:
          path: /dev/dri